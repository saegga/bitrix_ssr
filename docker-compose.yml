version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ~/projects/proj1/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf  # Конфиг Nginx
      - ~/projects/proj1/public_html:/var/www/html  # Сайт и API файлы из public_html
    depends_on:
      - php
      - frontend

  php:
    image: php:8.2-fpm
    container_name: php
    restart: always
    volumes:
      - ~/projects/proj1/public_html:/var/www/html  # Сайт и API файлы из public_html
      - ~/projects/proj1/docker/php/php.ini:/usr/local/etc/php/php.ini  # Конфиг PHP

  mariadb:
    image: mariadb:latest
    container_name: mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bitrix
      MYSQL_USER: bitrix
      MYSQL_PASSWORD: bitrix
    volumes:
      - ~/projects/proj1/data/mariadb:/var/lib/mysql  # Указываем физическую папку на хосте для данных
    ports:
      - "3306:3306"

  frontend:
    build: ~/projects/proj1/public_html/frontend
    container_name: nuxt
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ~/projects/proj1/public_html/frontend:/app  # Связываем папку frontend с контейнером для Nuxt
    environment:
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
    command: ["npm", "run", "start"]  # Запуск Nuxt в режиме SSR

volumes:
  # Тома не требуется, так как мы используем bind mount для данных MariaDB
